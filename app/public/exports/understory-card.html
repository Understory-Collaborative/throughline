<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Understory Collaborative — closing card</title>

    <!--
      Standalone closing card: Understory Collaborative, with a vine that grows
      in, and understorycollab.com. Same card as the last scene of
      throughline-pieces.html, on its own so you can capture it by itself.
      Double-click to open. Screenshot a frame for a still, or screen record for
      the animation. See exports/README.md for the Final Cut Pro steps.

      Keyboard:
        R  replay        S  still (the held frame, vine fully grown)
        T  transparent   4  toggle 1080p / 4K        H  hide this help
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* Brand tokens, kept in sync with app/src/index.css. */
        --paper: #f5eedf;
        --ink: #2a2019;
        --honey: #ce8c36;
        --support: #6e5b49;
        --primary: #41705a;
        --sage: #5b8a70;
        --font-sans: 'Atkinson Hyperlegible', system-ui, -apple-system,
          'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
        --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #2a2019;
        color: var(--ink);
        font-family: var(--font-sans);
        overflow: hidden;
      }

      .stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        flex: none;
        transform-origin: center center;
        overflow: hidden;
        display: grid;
        place-content: center;
        place-items: center;
        text-align: center;
        background-color: var(--paper);
        background-image:
          radial-gradient(
            120% 80% at 80% -10%,
            rgba(206, 140, 54, 0.2),
            rgba(206, 140, 54, 0) 60%
          ),
          radial-gradient(
            90% 70% at 5% 0%,
            rgba(181, 137, 92, 0.16),
            rgba(181, 137, 92, 0) 55%
          ),
          linear-gradient(180deg, #f7f0e2 0%, #f1e7d3 100%);
      }
      .stage[data-size='4k'] {
        width: 3840px;
        height: 2160px;
      }
      .stage[data-bg='transparent'] {
        background: transparent;
      }
      body:has(.stage[data-bg='transparent']) {
        background-color: #3a2f26;
        background-image:
          linear-gradient(45deg, #2a2019 25%, transparent 25%),
          linear-gradient(-45deg, #2a2019 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #2a2019 75%),
          linear-gradient(-45deg, transparent 75%, #2a2019 75%);
        background-size: 40px 40px;
        background-position: 0 0, 0 20px, 20px -20px, -20px 0;
      }

      /* Golden-hour light, drifting slowly so the held frame still breathes. */
      .stage::after {
        content: '';
        position: absolute;
        inset: -10%;
        pointer-events: none;
        background: radial-gradient(
          40% 40% at 72% 18%,
          rgba(206, 140, 54, 0.16),
          rgba(206, 140, 54, 0) 70%
        );
        animation: drift 20s var(--ease) infinite alternate;
      }
      .stage[data-bg='transparent']::after {
        display: none;
      }
      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }
        to {
          transform: translate3d(-3%, 2%, 0) scale(1.06);
        }
      }

      .vine {
        width: 230px;
        height: 260px;
        margin-bottom: 18px;
        overflow: visible;
      }
      .org {
        margin: 0;
        font-family: var(--font-display);
        font-size: 84px;
        font-weight: 600;
        line-height: 1.05;
      }
      .url {
        margin: 22px 0 0;
        font-size: 38px;
        letter-spacing: 0.02em;
        color: var(--primary);
      }
      .stage[data-size='4k'] .vine {
        width: 460px;
        height: 520px;
        margin-bottom: 36px;
      }
      .stage[data-size='4k'] .org {
        font-size: 168px;
      }
      .stage[data-size='4k'] .url {
        font-size: 76px;
      }

      /* The vine draws itself, stem first, then each leaf opens. */
      @keyframes grow {
        from {
          stroke-dashoffset: 1;
        }
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes leafIn {
        from {
          opacity: 0;
          transform: scale(0);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(18px);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }

      .stem {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
      }
      .leaf {
        opacity: 0;
        transform: scale(0);
        transform-box: fill-box;
        transform-origin: center;
      }
      .reveal {
        opacity: 0;
        transform: translateY(18px);
        filter: blur(6px);
      }

      .stage[data-play='on'] .stem {
        animation: grow 2.6s var(--ease) 0.3s forwards;
      }
      .stage[data-play='on'] .leaf {
        animation: leafIn 0.7s var(--ease) calc(0.3s + var(--lt)) forwards;
      }
      .stage[data-play='on'] .org {
        animation: rise 1.4s var(--ease) 1.8s forwards;
      }
      .stage[data-play='on'] .url {
        animation: rise 1.4s var(--ease) 2.4s forwards;
      }

      /* Still mode and reduced motion show the held frame at once. */
      .stage[data-play='still'] .stem {
        stroke-dashoffset: 0;
        animation: none;
      }
      .stage[data-play='still'] .leaf,
      .stage[data-play='still'] .reveal {
        opacity: 1;
        transform: none;
        filter: none;
        animation: none;
      }
      @media (prefers-reduced-motion: reduce) {
        .stage::after {
          animation: none;
        }
        .stage .stem {
          stroke-dashoffset: 0 !important;
          animation: none !important;
        }
        .stage .leaf,
        .stage .reveal {
          opacity: 1 !important;
          transform: none !important;
          filter: none !important;
          animation: none !important;
        }
      }

      .help {
        position: fixed;
        left: 16px;
        bottom: 16px;
        max-width: 430px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(42, 32, 25, 0.88);
        color: #f5eedf;
        font-size: 13px;
        line-height: 1.5;
        z-index: 10;
      }
      .help[hidden] {
        display: none;
      }
      .help b {
        color: var(--honey);
      }
      .help kbd {
        display: inline-block;
        min-width: 18px;
        padding: 1px 6px;
        border-radius: 5px;
        background: rgba(245, 238, 223, 0.16);
        text-align: center;
      }
      .help .meta {
        margin-top: 8px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <main class="stage" data-size="1080" data-bg="cream" data-play="on">
      <svg class="vine" viewBox="0 0 220 260" fill="none" aria-hidden="true">
        <path
          class="stem"
          d="M110 252 C 92 216, 128 190, 110 154 C 92 118, 128 94, 110 58 C 100 38, 104 26, 110 12"
          pathLength="1"
          stroke="var(--primary)"
          stroke-width="4"
          stroke-linecap="round"
        />
        <!-- Leaves open in order as the stem grows past each one. -->
        <g transform="rotate(-42 96 214)">
          <ellipse class="leaf" cx="96" cy="214" rx="19" ry="9"
            fill="var(--primary)" style="--lt: 0.5s" />
        </g>
        <g transform="rotate(44 124 184)">
          <ellipse class="leaf" cx="124" cy="184" rx="18" ry="9"
            fill="var(--sage)" style="--lt: 0.8s" />
        </g>
        <g transform="rotate(-46 95 150)">
          <ellipse class="leaf" cx="95" cy="150" rx="17" ry="8.5"
            fill="var(--primary)" style="--lt: 1.1s" />
        </g>
        <g transform="rotate(46 125 118)">
          <ellipse class="leaf" cx="125" cy="118" rx="16" ry="8"
            fill="var(--sage)" style="--lt: 1.4s" />
        </g>
        <g transform="rotate(-40 99 84)">
          <ellipse class="leaf" cx="99" cy="84" rx="14" ry="7"
            fill="var(--primary)" style="--lt: 1.7s" />
        </g>
        <g transform="rotate(40 120 56)">
          <ellipse class="leaf" cx="120" cy="56" rx="12" ry="6"
            fill="var(--sage)" style="--lt: 2s" />
        </g>
        <g transform="rotate(0 110 26)">
          <ellipse class="leaf" cx="110" cy="26" rx="9" ry="5"
            fill="var(--primary)" style="--lt: 2.3s" />
        </g>
      </svg>
      <p class="org reveal">Understory Collaborative</p>
      <p class="url reveal">understorycollab.com</p>
    </main>

    <aside class="help" id="help">
      <div>
        <b>Understory closing card</b> — for Final Cut Pro.
        <span class="meta" id="state"></span>
      </div>
      <div style="margin-top: 8px">
        <kbd>R</kbd> replay &nbsp; <kbd>S</kbd> still &nbsp;
        <kbd>T</kbd> transparent &nbsp; <kbd>4</kbd> 4K &nbsp;
        <kbd>H</kbd> hide this
      </div>
      <div class="meta">
        Still: hide this, screenshot the card. Animation: hide this, screen
        record, press R to replay. See exports/README.md.
      </div>
    </aside>

    <script>
      const stage = document.querySelector('.stage')
      const help = document.getElementById('help')
      const state = document.getElementById('state')

      function fit() {
        const w = stage.dataset.size === '4k' ? 3840 : 1920
        const h = stage.dataset.size === '4k' ? 2160 : 1080
        const pad = help.hidden ? 1 : 0.94
        const scale = Math.min(
          (window.innerWidth / w) * pad,
          (window.innerHeight / h) * pad,
        )
        stage.style.transform = `scale(${scale})`
        state.textContent = `${w}x${h} · preview ${(scale * 100).toFixed(0)}%`
      }

      function replay() {
        stage.dataset.play = 'off'
        void stage.offsetWidth
        stage.dataset.play = 'on'
      }

      window.addEventListener('resize', fit)
      window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase()
        if (k === 'r') replay()
        else if (k === 's')
          stage.dataset.play = stage.dataset.play === 'still' ? 'on' : 'still'
        else if (k === 't')
          stage.dataset.bg =
            stage.dataset.bg === 'transparent' ? 'cream' : 'transparent'
        else if (k === '4')
          stage.dataset.size = stage.dataset.size === '4k' ? '1080' : '4k'
        else if (k === 'h') help.hidden = !help.hidden
        fit()
      })

      fit()
    </script>
  </body>
</html>
